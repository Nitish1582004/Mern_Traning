   <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Form</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background-color:white;
  }

  .form-box {
    width: 300px;
    margin: 50px auto;
    padding: 20px;
    background: #00FF7F;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    border: 1px solid black;
  }

  .form-box input[type="text"],
  .form-box input[type="email"] {
    width: 100%;
    padding: 8px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 4px;
  }

  .form-box label {
    font-size: 14px;
  }

 

  .form-box button {
    width: 100%;
    padding: 10px;
    background-color: white;
    color:black;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }

  .form-box button:hover {
    background-color: blue;
  }
</style>
</head>

<body>

<div class="form-box">
  <form>
    <h2 style="text-align: center;">Form Tag</h2>
    <label for="Text">Name</label><br>
    <input type="text" name="first_name" placeholder="First Name">
<label for="Text">Last</label><br>
    <input type="text" name="last_name" placeholder="Last Name">
<label for="email">Email</label><br>
    <input type="email" name="email" placeholder="Email">
<label for="dob">Date of Birth</label><br>
<input type="date" id="dob" name="dob">
<br><br>
   
      <label for="male">Male</label>
      <input type="radio" name="fav_langugae" value="male">

       <label for="female">FeMale</label>
         <input type="radio" name="fav_langugae" value="female">
    

       <label for="others">Other</label>
         <input type="radio" name="fav_langugae" value="otherf">

<br>

    <button type="submit">Submit</button>
  </form>
</div>

</body>
</html>
